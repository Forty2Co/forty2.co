name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: make install

      - name: Build
        run: make build
        env:
          VITE_LOOPS_FORM_ID: ${{ secrets.VITE_LOOPS_FORM_ID }}

      - name: Verify CNAME file
        run: |
          if [ ! -f dist/CNAME ]; then
            echo "ERROR: CNAME file missing from build output"
            exit 1
          fi
          echo "CNAME file found with content: $(cat dist/CNAME)"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
